services:
  ttyd-proxy:
    image: 'caddy:2-alpine'
    restart: unless-stopped
    depends_on:
      - ttydbridge
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      - sh
      - '-c'
      - "printf ':8080 {\\n  reverse_proxy host.docker.internal:2222\\n}\\n' > /etc/caddy/Caddyfile\ncaddy run --config /etc/caddy/Caddyfile --adapter caddyfile\n"
    expose:
      - '8080'
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.ttyd-proxy.rule=Host(`ttyd.spi-analytics.cloudns.nz`)
      - traefik.http.routers.ttyd-proxy.entrypoints=https
      - traefik.http.routers.ttyd-proxy.tls=true
      - traefik.http.routers.ttyd-proxy.priority=999999
      - traefik.http.routers.ttyd-proxy.service=ttyd-proxy-svc
      - traefik.http.services.ttyd-proxy-svc.loadbalancer.server.port=8080
  ttydbridge:
    image: 'cp0204/ttydbridge:latest'
    restart: unless-stopped
    privileged: true
    pid: host
    ipc: host
    environment:
      PORT: '2222'
      EXEC_DIR: /opt
      START_COMMAND: bash
      ENABLE_SSL: 'false'
      HTTP_USERNAME: '${HTTP_USERNAME}'
      HTTP_PASSWORD: '${HTTP_PASSWORD}'
    volumes:
      - '/opt:/opt'
    expose:
      - '2222'
    networks:
      - coolify
networks:
  coolify:
    external: true
