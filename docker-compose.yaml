services:
  ttyd-proxy:
    image: 'caddy:2-alpine'
    restart: unless-stopped
    depends_on:
      - ttydbridge
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      - sh
      - '-c'
      - "printf ':8080 {\\n  reverse_proxy host.docker.internal:2222\\n}\\n' > /etc/caddy/Caddyfile\ncaddy run --config /etc/caddy/Caddyfile --adapter caddyfile\n"
    expose:
      - '8080'
    networks:
      - coolify
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -S -O /dev/null http://127.0.0.1:8080/ 2>&1 | grep -E 'HTTP/.* (200|401|403)' >/dev/null"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.ttyd-proxy.rule=Host(`${DOMAIN:-agentdesk.example.com}`)
      - traefik.http.routers.ttyd-proxy.entrypoints=https
      - traefik.http.routers.ttyd-proxy.tls=true
      - traefik.http.routers.ttyd-proxy.priority=999999
      - traefik.http.routers.ttyd-proxy.service=ttyd-proxy-svc
      - traefik.http.services.ttyd-proxy-svc.loadbalancer.server.port=8080
  ttydbridge:
    image: 'cp0204/ttydbridge:latest'
    restart: unless-stopped
    privileged: true
    pid: host
    ipc: host
    environment:
      PORT: '2222'
      EXEC_DIR: /opt
      START_COMMAND: >-
        bash -lc 'if [ -n "$${DEFAULT_USER:-}" ]; then workspace="$${DEFAULT_WORKSPACE:-/home/$${DEFAULT_USER}}"; exec su - "$${DEFAULT_USER}" -c "cd \"$${workspace}\" && exec bash"; fi; cd "$${DEFAULT_WORKSPACE:-/}" && exec bash'
      ENABLE_SSL: 'false'
      DEFAULT_USER: '${DEFAULT_USER:-}'
      DEFAULT_WORKSPACE: '${DEFAULT_WORKSPACE:-}'
      HTTP_USERNAME: '${HTTP_USERNAME}'
      HTTP_PASSWORD: '${HTTP_PASSWORD}'
    volumes:
      - '/opt:/opt'
    expose:
      - '2222'
    networks:
      - coolify
networks:
  coolify:
    external: true
